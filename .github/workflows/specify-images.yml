name: Specify Images  # 指定镜像

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]  # 当推送到 main 分支时触发

env:
  MY_REGISTRY: "${{ secrets.MY_REGISTRY }}"  # 镜像仓库地址
  MY_REGISTRY_USER: "${{ secrets.MY_REGISTRY_USER }}"  # 镜像仓库用户名
  MY_REGISTRY_PASSWORD: "${{ secrets.MY_REGISTRY_PASSWORD }}"  # 镜像仓库密码

jobs:
  build:
    name: Pull images and Push Images
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 运行器
    steps:
    - name: Install skopeo, jq, and yq
      run: |
        sudo apt-get update
        sudo apt-get install -y skopeo jq
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
        sudo chmod +x /usr/bin/yq

    - name: Checkout Code
      uses: actions/checkout@v4  # 检出代码仓库

    - name: Read setting.yml
      run: |
        SETTINGS_FILE="setting.yml"
        if [ -f "$SETTINGS_FILE" ]; then
          enable_specify_images=$(yq e '.["specify-images"].enable' "$SETTINGS_FILE")
          if [ "$enable_specify_images" != "true" ]; then
            echo "specify-images未启用，跳过后续步骤。"
            echo "enable_specify_images=false" >> $GITHUB_ENV
          else
            echo "enable_specify_images=true" >> $GITHUB_ENV
            images=$(yq e '.["specify-images"].images | join(",")' "$SETTINGS_FILE")
            echo "images=$images" >> $GITHUB_ENV
          fi
        else
          echo "未找到 settings.yml 文件，跳过后续步骤。"
          echo "enable_specify_images=false" >> $GITHUB_ENV
        fi

    - name: Read Images list, build, and push images to the target registry
      if: env.enable_specify_images == 'true'
      run: |
        docker login -u $MY_REGISTRY_USER -p $MY_REGISTRY_PASSWORD $MY_REGISTRY

        updated_count=0  # 初始化更新镜像计数
        skipped_count=0  # 初始化跳过镜像计数
        failed_count=0   # 初始化失败镜像计数
        failed_images=() # 失败的镜像列表
        IFS=',' read -r -a images <<< "$images"  # 读取环境变量中的仓库数组

        # 定义函数：格式化输出 layers 信息
        print_layers_info() {
            local layers="$1"
            local label="$2"

            echo "$label"
            if [ ${#layers} -le 100 ]; then
                echo "$layers"
            elif [ ${#layers} -le 200 ]; then
                echo "${layers:0:50}...${layers: -50}"
            else
                echo "${layers:0:50}...${layers:$((${#layers}/2-25)):50}...${layers: -50}"
            fi
        }

        # 处理镜像数组中的每一个镜像
        for image in "${images[@]}"; do
            echo "============================================================================="
            echo "处理镜像: $image"

            # 解析镜像名称 - 基于路径层级判断格式
            # 统计"/"的数量来判断镜像格式类型
            slash_count=$(echo "$image" | grep -o '/' | wc -l)

            registry=""
            namespace=""
            repo_and_tag=""

            case $slash_count in
                0)
                    # 格式: repo:tag (无namespace，Docker Hub官方镜像)
                    # 例如: nginx:latest, postgres:14.7
                    registry="docker.io"
                    namespace="library"
                    repo_and_tag="$image"
                    ;;
                1)
                    # 格式: namespace/repo:tag (Docker Hub标准格式)
                    # 例如: vaultwarden/server:1.36.0, grafana/grafana:11.0.0
                    registry="docker.io"
                    namespace=$(echo "$image" | cut -d'/' -f1)
                    repo_and_tag=$(echo "$image" | cut -d'/' -f2)
                    ;;
                2)
                    # 格式: registry/namespace/repo:tag (完整格式)
                    # 例如: registry.cloudvalley.site:4/vaultwarden/server:1.32.0
                    registry=$(echo "$image" | cut -d'/' -f1)
                    namespace=$(echo "$image" | cut -d'/' -f2)
                    repo_and_tag=$(echo "$image" | cut -d'/' -f3)
                    ;;
                *)
                    echo "❌ 无法解析镜像名称: $image (路径层级过多)"
                    failed_count=$((failed_count + 1))
                    failed_images+=("$image")
                    continue
                    ;;
            esac

            # 解析repo和tag
            if echo "$repo_and_tag" | grep -q ':'; then
                repo=$(echo "$repo_and_tag" | cut -d':' -f1)
                tag=$(echo "$repo_and_tag" | cut -d':' -f2)
            else
                repo="$repo_and_tag"
                tag="latest"
            fi

            echo "解析出的注册表: $registry"
            echo "解析出的命名空间: $namespace"
            echo "解析出的仓库: $repo"
            echo "解析出的标签: $tag"
            echo "----------------------------------------------------"

            # 构造目标镜像 - 保持namespace路径
            target_image="$MY_REGISTRY/$namespace/$repo:$tag"
            echo "目标镜像: $target_image"
            echo "----------------------------------------------------"

            # 获取源镜像的 manifest（包含错误处理）
            if ! source_manifest=$(skopeo inspect docker://$image 2>&1); then
                echo "❌ 无法获取源镜像 manifest: $source_manifest"
                failed_count=$((failed_count + 1))
                failed_images+=("$image")
                continue
            fi

            # 获取镜像大小 - 从 manifest 的 layers 计算
            source_size=0

            # 检查 Layers 字段是否存在
            source_layers_check=$(echo "$source_manifest" | jq -r '.Layers // "null"' 2>/dev/null)

            if [ "$source_layers_check" != "null" ] && [ -n "$source_layers_check" ]; then
                # 获取 raw manifest
                source_manifest_raw=$(skopeo inspect --raw docker://$image 2>&1)
                media_type=$(echo "$source_manifest_raw" | jq -r '.mediaType // ""' 2>/dev/null)

                # 判断 manifest 类型并计算大小
                if [[ "$media_type" == *"manifest.list"* ]] || [[ "$media_type" == *"image.index"* ]]; then
                    # 多架构镜像 (Docker Manifest List 或 OCI Image Index)
                    amd64_digest=$(echo "$source_manifest_raw" | jq -r '.manifests[] | select(.platform.architecture == "amd64" and .platform.os == "linux") | .digest' 2>/dev/null | head -1)

                    if [ -n "$amd64_digest" ] && [ "$amd64_digest" != "null" ]; then
                        # 构造带 digest 的镜像引用
                        image_with_digest="${image%%:*}@${amd64_digest}"
                        amd64_manifest=$(skopeo inspect --raw docker://$image_with_digest 2>&1)

                        if ! echo "$amd64_manifest" | grep -q "error"; then
                            # 从 layers 数组计算总大小
                            source_size=$(echo "$amd64_manifest" | jq -r '[.layers[].size] | add // 0' 2>/dev/null || echo "0")
                        fi
                    fi
                elif [[ "$media_type" == *"manifest.v2"* ]] || [[ "$media_type" == *"image.manifest"* ]]; then
                    # 标准 v2 manifest 或 OCI manifest
                    source_size=$(echo "$source_manifest_raw" | jq -r '[.layers[].size] | add // 0' 2>/dev/null || echo "0")
                fi
            fi

            source_size_mb=$(awk "BEGIN {printf \"%.2f\", $source_size / 1024 / 1024}")
            echo "镜像大小: $source_size bytes (${source_size_mb} MB)"
            echo "----------------------------------------------------"

            source_layers=$(echo "$source_manifest" | jq -r '.Layers[]' | sed -n '2,$p' | tr '\n' ' ')
            print_layers_info "$source_layers" "源镜像 $image 的 layers（忽略首层后）:"

            # 获取目标镜像的 manifest
            target_manifest=$(skopeo inspect --creds $MY_REGISTRY_USER:$MY_REGISTRY_PASSWORD docker://$target_image 2>&1 || echo "")
            if [ -n "$target_manifest" ] && ! echo "$target_manifest" | grep -q "error"; then
                target_layers=$(echo "$target_manifest" | jq -r '.Layers[]' | sed -n '2,$p' | tr '\n' ' ')
                print_layers_info "$target_layers" "目标镜像 $target_image 的 layers（忽略首层后）:"
            else
                target_layers=""
            fi
            echo "----------------------------------------------------"

            # 检查是否需要跳过
            if [ -n "$target_layers" ] && [ "$source_layers" == "$target_layers" ]; then
                echo "✅ 镜像 $target_image 已存在且各层一致，跳过。"
                skipped_count=$((skipped_count + 1))
                continue
            fi

            echo "⬇️  开始拉取和推送镜像..."
            echo "----------------------------------------------------"

            # 拉取镜像
            if ! docker pull $image; then
                echo "❌ Docker 拉取失败: $image"
                failed_count=$((failed_count + 1))
                failed_images+=("$image")
                continue
            fi

            # 打标签
            if ! docker tag $image $target_image; then
                echo "❌ Docker 打标签失败: $image -> $target_image"
                failed_count=$((failed_count + 1))
                failed_images+=("$image")
                continue
            fi

            # 推送镜像
            if ! docker push $target_image; then
                echo "❌ Docker 推送失败: $target_image"
                failed_count=$((failed_count + 1))
                failed_images+=("$image")
                continue
            fi

            echo "✅ 镜像推送成功: $target_image"
            updated_count=$((updated_count + 1))
        done

        echo "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~"
        echo "📊 处理汇总:"
        echo "   总计: ${#images[@]} 个镜像"
        echo "   ✅ 更新: $updated_count 个"
        echo "   ⏭️  跳过: $skipped_count 个"
        echo "   ❌ 失败: $failed_count 个"

        if [ $failed_count -gt 0 ]; then
            echo "   失败的镜像:"
            for img in "${failed_images[@]}"; do
                echo "      - $img"
            done
        fi

        # 将转存的镜像列表保存到环境变量，供webhook使用
        echo "transfer_images=$images" >> $GITHUB_ENV
        echo "transfer_count=$updated_count" >> $GITHUB_ENV
        echo "transfer_skipped=$skipped_count" >> $GITHUB_ENV
        echo "transfer_failed=$failed_count" >> $GITHUB_ENV

    - name: Notify OpenClaw
      if: always()  #无论成功或失败都发送通知
      run: |
        echo "=========================================="
        echo "发送 webhook 通知..."
        echo "WEBHOOK_URL: ${{ secrets.OPENCLAW_WEBHOOK_URL }}"
        echo "job.status: ${{ job.status }}"
        echo "github.run_id: ${{ github.run_id }}"
        echo "transfer_images: ${{ env.transfer_images }}"
        echo "transfer_count: ${{ env.transfer_count }}"
        echo "transfer_skipped: ${{ env.transfer_skipped }}"
        echo "transfer_failed: ${{ env.transfer_failed }}"
        echo "=========================================="

        # 生成 JSON 数据（单行）- 包含更详细的统计信息
        WEBHOOK_DATA="{\"event\":\"docker_image_transfer\",\"status\":\"${{ job.status }}\",\"run_id\":\"${{ github.run_id }}\",\"run_number\":\"${{ github.run_number }}\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"images\":\"${{ env.transfer_images }}\",\"updated_count\":\"${{ env.transfer_count }}\",\"skipped_count\":\"${{ env.transfer_skipped }}\",\"failed_count\":\"${{ env.transfer_failed }}\",\"actor\":\"${{ github.actor }}\",\"timestamp\":\"$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\"}"

        echo "发送的数据: $WEBHOOK_DATA"

        # 发送 webhook
        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST "${{ secrets.OPENCLAW_WEBHOOK_URL }}" \
          -H "Authorization: Bearer ${{ secrets.OPENCLAW_HOOK_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "$WEBHOOK_DATA")

        echo "HTTP 状态码: $RESPONSE"
        echo "=========================================="