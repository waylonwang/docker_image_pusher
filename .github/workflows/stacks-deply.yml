name: Stacks Deploy  # е·ҘдҪңжөҒзЁӢзҡ„еҗҚз§°

on:
  repository_dispatch: # APIи§ҰеҸ‘
    types: [stack-deployed]
  workflow_dispatch:  # жүӢеҠЁи§ҰеҸ‘
  push:
    branches: [ main ]  # еҪ“жҺЁйҖҒеҲ° main еҲҶж”Ҝж—¶и§ҰеҸ‘

env:
  MY_REGISTRY: "${{ secrets.MY_REGISTRY }}"  # й•ңеғҸд»“еә“ең°еқҖ
  MY_REGISTRY_USER: "${{ secrets.MY_REGISTRY_USER }}"  # й•ңеғҸд»“еә“з”ЁжҲ·еҗҚ
  MY_REGISTRY_PASSWORD: "${{ secrets.MY_REGISTRY_PASSWORD }}"  # й•ңеғҸд»“еә“еҜҶз Ғ

jobs:
  build:
    name: Pull Repos and Push Images 
    runs-on: ubuntu-latest  # дҪҝз”ЁжңҖж–°зҡ„ Ubuntu иҝҗиЎҢеҷЁ
    steps:
    - name: Install skopeo, jq, and yq
      run: | 
        sudo apt-get update
        sudo apt-get install -y skopeo jq
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
        sudo chmod +x /usr/bin/yq

    - name: Checkout Code
      uses: actions/checkout@v4  # жЈҖеҮәд»Јз Ғд»“еә“

    - name: Read setting.yml
      run: |
        SETTINGS_FILE="setting.yml"
        if [ -f "$SETTINGS_FILE" ]; then
          enable_stacks_deploy=$(yq e '.["stacks-deploy"].enable' "$SETTINGS_FILE")
          if [ "$enable_stacks_deploy" != "true" ]; then
            echo "stacks-deployжңӘеҗҜз”ЁпјҢи·іиҝҮеҗҺз»ӯжӯҘйӘӨгҖӮ"
            echo "enable_stacks_deploy=false" >> $GITHUB_ENV
          else
            echo "enable_stacks_deploy=true" >> $GITHUB_ENV
            repos=$(yq e '.["stacks-deploy"].repos | join(",")' "$SETTINGS_FILE")
            echo "repos=$repos" >> $GITHUB_ENV
          fi
        else
          echo "жңӘжүҫеҲ° settings.yml ж–Үд»¶пјҢи·іиҝҮеҗҺз»ӯжӯҘйӘӨгҖӮ"
          echo "enable_stacks_deploy=false" >> $GITHUB_ENV
        fi

    - name: Docker Setup Buildx
      if: env.enable_stacks_deploy == 'true'
      uses: docker/setup-buildx-action@v3  # и®ҫзҪ® Docker Buildx

    - name: Read Stacks repo, build, and push images to the target registry
      if: env.enable_stacks_deploy == 'true'
      run: |
        images=()  # еҲқе§ӢеҢ–й•ңеғҸж•°з»„
        updated_count=0  # еҲқе§ӢеҢ–жӣҙж–°й•ңеғҸи®Ўж•°
        skipped_count=0  # еҲқе§ӢеҢ–и·іиҝҮй•ңеғҸи®Ўж•°
        failed_count=0   # еҲқе§ӢеҢ–еӨұиҙҘй•ңеғҸи®Ўж•°
        failed_images=() # еӨұиҙҘзҡ„й•ңеғҸеҲ—иЎЁ
        IFS=',' read -r -a repos <<< "$repos"  # иҜ»еҸ–зҺҜеўғеҸҳйҮҸдёӯзҡ„д»“еә“ж•°з»„

        echo ">>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>"

        # е®ҡд№үеҮҪж•°пјҡж јејҸеҢ–иҫ“еҮә layers дҝЎжҒҜ
        print_layers_info() {
            local layers="$1"
            local label="$2"

            echo "$label"
            if [ ${#layers} -le 100 ]; then
                echo "$layers"
            elif [ ${#layers} -le 200 ]; then
                echo "${layers:0:50}...${layers: -50}"
            else
                echo "${layers:0:50}...${layers:$((${#layers}/2-25)):50}...${layers: -50}"
            fi
        }

        # еӨ„зҗҶд»“еә“ж•°з»„дёӯзҡ„жҜҸдёҖдёӘд»“еә“
        for repo in "${repos[@]}"; do
            echo "----------------------------------------------------"
            echo "рҹ“Ұ еӨ„зҗҶд»“еә“: $repo"

            echo "жӯЈеңЁе…ӢйҡҶд»“еә“: $repo"
            if ! git clone "$repo" repo_clone 2>&1; then
                echo "вқҢ е…ӢйҡҶд»“еә“еӨұиҙҘ: $repo"
                continue
            fi

            if [ -f "repo_clone/docker-compose.yml" ]; then
                echo "вң… еңЁ $repo дёӯжүҫеҲ° docker-compose.yml"
                image_count=0
                while IFS= read -r line || [ -n "$line" ]; do
                    # жҹҘжүҫжіЁйҮҠдёӯзҡ„ image-ref й”®пјҲж”№иҝӣжӯЈеҲҷиЎЁиҫҫејҸпјү
                    if [[ "$line" =~ #[[:space:]]image-ref:[[:space:]]*(.+)$ ]]; then
                        image_ref="${BASH_REMATCH[1]}"
                        image_ref=$(echo "$image_ref" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')  # еҺ»йҷӨеүҚеҗҺз©әж ј
                        if [ -n "$image_ref" ]; then
                            images+=("$image_ref")
                            image_count=$((image_count + 1))
                        fi
                    fi
                done < repo_clone/docker-compose.yml
                echo "   жүҫеҲ° $image_count дёӘй•ңеғҸеј•з”Ё"
            else
                echo "вҡ пёҸ  жңӘжүҫеҲ° docker-compose.yml"
            fi
            rm -rf repo_clone  # еҲ йҷӨе…ӢйҡҶзҡ„д»“еә“ж–Үд»¶еӨ№
        done

        # еҰӮжһңжІЎжңүжүҫеҲ°д»»дҪ•й•ңеғҸпјҢи·іиҝҮеҗҺз»ӯеӨ„зҗҶ
        if [ ${#images[@]} -eq 0 ]; then
            echo "вҡ пёҸ  жңӘжүҫеҲ°д»»дҪ•й•ңеғҸеј•з”ЁпјҢи·іиҝҮеҗҺз»ӯеӨ„зҗҶгҖӮ"
            echo "transfer_images=" >> $GITHUB_ENV
            echo "transfer_count=0" >> $GITHUB_ENV
            echo "transfer_skipped=0" >> $GITHUB_ENV
            echo "transfer_failed=0" >> $GITHUB_ENV
            exit 0
        fi

        echo "============================================================================="
        echo "е…ұжүҫеҲ° ${#images[@]} дёӘй•ңеғҸйңҖиҰҒеӨ„зҗҶ"
        echo "============================================================================="

        # еӨ„зҗҶй•ңеғҸж•°з»„дёӯзҡ„жҜҸдёҖдёӘй•ңеғҸ
        for image in "${images[@]}"; do
            echo "============================================================================="
            echo "еӨ„зҗҶй•ңеғҸ: $image"

            # и§Јжһҗй•ңеғҸеҗҚз§° - еҹәдәҺи·Ҝеҫ„еұӮзә§еҲӨж–ӯж јејҸ
            # з»ҹи®Ў"/"зҡ„ж•°йҮҸжқҘеҲӨж–ӯй•ңеғҸж јејҸзұ»еһӢ
            slash_count=$(echo "$image" | grep -o '/' | wc -l)

            registry=""
            namespace=""
            repo_and_tag=""

            case $slash_count in
                0)
                    # ж јејҸ: repo:tag (ж— namespaceпјҢDocker Hubе®ҳж–№й•ңеғҸ)
                    # дҫӢеҰӮ: nginx:latest, postgres:14.7
                    registry="docker.io"
                    namespace="library"
                    repo_and_tag="$image"
                    ;;
                1)
                    # ж јејҸ: namespace/repo:tag (Docker Hubж ҮеҮҶж јејҸ)
                    # дҫӢеҰӮ: vaultwarden/server:1.36.0, grafana/grafana:11.0.0
                    registry="docker.io"
                    namespace=$(echo "$image" | cut -d'/' -f1)
                    repo_and_tag=$(echo "$image" | cut -d'/' -f2)
                    ;;
                2)
                    # ж јејҸ: registry/namespace/repo:tag (е®Ңж•ҙж јејҸ)
                    # дҫӢеҰӮ: registry.cloudvalley.site:4/vaultwarden/server:1.32.0
                    registry=$(echo "$image" | cut -d'/' -f1)
                    namespace=$(echo "$image" | cut -d'/' -f2)
                    repo_and_tag=$(echo "$image" | cut -d'/' -f3)
                    ;;
                *)
                    echo "вқҢ ж— жі•и§Јжһҗй•ңеғҸеҗҚз§°: $image (и·Ҝеҫ„еұӮзә§иҝҮеӨҡ)"
                    failed_count=$((failed_count + 1))
                    failed_images+=("$image")
                    continue
                    ;;
            esac

            # и§Јжһҗrepoе’Ңtag
            if echo "$repo_and_tag" | grep -q ':'; then
                repo=$(echo "$repo_and_tag" | cut -d':' -f1)
                tag=$(echo "$repo_and_tag" | cut -d':' -f2)
            else
                repo="$repo_and_tag"
                tag="latest"
            fi

            echo "и§ЈжһҗеҮәзҡ„жіЁеҶҢиЎЁ: $registry"
            echo "и§ЈжһҗеҮәзҡ„е‘ҪеҗҚз©әй—ҙ: $namespace"
            echo "и§ЈжһҗеҮәзҡ„д»“еә“: $repo"
            echo "и§ЈжһҗеҮәзҡ„ж Үзӯҫ: $tag"
            echo "----------------------------------------------------"

            # жһ„йҖ зӣ®ж Үй•ңеғҸ - дҝқжҢҒnamespaceи·Ҝеҫ„
            target_image="$MY_REGISTRY/$namespace/$repo:$tag"
            echo "зӣ®ж Үй•ңеғҸ: $target_image"
            echo "----------------------------------------------------"

            # иҺ·еҸ–жәҗй•ңеғҸзҡ„ manifestпјҲеҢ…еҗ«й”ҷиҜҜеӨ„зҗҶпјү
            if ! source_manifest=$(skopeo inspect docker://$image 2>&1); then
                echo "вқҢ ж— жі•иҺ·еҸ–жәҗй•ңеғҸ manifest: $source_manifest"
                failed_count=$((failed_count + 1))
                failed_images+=("$image")
                continue
            fi

            # иҺ·еҸ–й•ңеғҸеӨ§е°Ҹ - д»Һ manifest зҡ„ layers и®Ўз®—
            # йҰ–е…Ҳе°қиҜ•зӣҙжҺҘд»Һ layers и®Ўз®—
            source_size=$(echo "$source_manifest" | jq -r '.Layers // "null"' 2>/dev/null)

            if [ "$source_size" != "null" ] && [ -n "$source_size" ]; then
                # skopeo inspect иҝ”еӣһдәҶ Layers ж•°з»„пјҢдҪҶиҝҷдёӘжҳҜ digest еҲ—иЎЁпјҢжІЎжңү size
                # йңҖиҰҒиҺ·еҸ– raw manifest жқҘи®Ўз®— size
                source_manifest_raw=$(skopeo inspect --raw docker://$image 2>&1)

                # жЈҖжҹҘжҳҜеҗҰжҳҜ Manifest List жҲ– OCI Image Index
                media_type=$(echo "$source_manifest_raw" | jq -r '.mediaType // ""' 2>/dev/null)

                if [[ "$media_type" == *"manifest.list"* ]] || [[ "$media_type" == *"image.index"* ]]; then
                    # еӨҡжһ¶жһ„й•ңеғҸ - иҺ·еҸ– amd64/linux зҡ„ digest
                    echo "вҡ пёҸ  жЈҖжөӢеҲ°еӨҡжһ¶жһ„й•ңеғҸпјҢиҺ·еҸ– amd64 жһ¶жһ„еӨ§е°Ҹ"
                    amd64_digest=$(echo "$source_manifest_raw" | jq -r '.manifests[] | select(.platform.architecture == "amd64" and .platform.os == "linux") | .digest' 2>/dev/null | head -1)

                    if [ -n "$amd64_digest" ] && [ "$amd64_digest" != "null" ]; then
                        # жһ„йҖ еёҰ digest зҡ„й•ңеғҸеј•з”Ё
                        image_with_digest="${image%%:*}@${amd64_digest}"
                        amd64_manifest=$(skopeo inspect --raw docker://$image_with_digest 2>&1)
                        source_size=$(echo "$amd64_manifest" | jq -r '[.layers[].size] | add // 0' 2>/dev/null || echo "0")
                    else
                        source_size=0
                    fi
                elif [[ "$media_type" == *"manifest.v2"* ]] || [[ "$media_type" == *"image.manifest"* ]]; then
                    # ж ҮеҮҶ v2 manifest жҲ– OCI manifest - зӣҙжҺҘд»Һ layers и®Ўз®—
                    source_size=$(echo "$source_manifest_raw" | jq -r '[.layers[].size] | add // 0' 2>/dev/null || echo "0")
                else
                    source_size=0
                fi
            else
                source_size=0
            fi

            source_size_mb=$(awk "BEGIN {printf \"%.2f\", $source_size / 1024 / 1024}")
            echo "й•ңеғҸеӨ§е°Ҹ: $source_size bytes (${source_size_mb} MB)"
            echo "----------------------------------------------------"

            source_layers=$(echo "$source_manifest" | jq -r '.Layers[]' | sed -n '2,$p' | tr '\n' ' ')
            print_layers_info "$source_layers" "жәҗй•ңеғҸ $image зҡ„ layersпјҲеҝҪз•ҘйҰ–еұӮеҗҺпјү:"

            # иҺ·еҸ–зӣ®ж Үй•ңеғҸзҡ„ manifest
            target_manifest=$(skopeo inspect --creds $MY_REGISTRY_USER:$MY_REGISTRY_PASSWORD docker://$target_image 2>&1 || echo "")
            if [ -n "$target_manifest" ] && ! echo "$target_manifest" | grep -q "error"; then
                target_layers=$(echo "$target_manifest" | jq -r '.Layers[]' | sed -n '2,$p' | tr '\n' ' ')
                print_layers_info "$target_layers" "зӣ®ж Үй•ңеғҸ $target_image зҡ„ layersпјҲеҝҪз•ҘйҰ–еұӮеҗҺпјү:"
            else
                target_layers=""
            fi
            echo "----------------------------------------------------"

            # жЈҖжҹҘжҳҜеҗҰйңҖиҰҒи·іиҝҮ
            if [ -n "$target_layers" ] && [ "$source_layers" == "$target_layers" ]; then
                echo "вң… й•ңеғҸ $target_image е·ІеӯҳеңЁдё”еҗ„еұӮдёҖиҮҙпјҢи·іиҝҮгҖӮ"
                skipped_count=$((skipped_count + 1))
                continue
            fi

            echo "в¬ҮпёҸ  ејҖе§ӢжӢүеҸ–е’ҢжҺЁйҖҒй•ңеғҸ..."
            echo "----------------------------------------------------"

            # жӢүеҸ–й•ңеғҸ
            if ! docker pull $image; then
                echo "вқҢ Docker жӢүеҸ–еӨұиҙҘ: $image"
                failed_count=$((failed_count + 1))
                failed_images+=("$image")
                continue
            fi

            # жү“ж Үзӯҫ
            if ! docker tag $image $target_image; then
                echo "вқҢ Docker жү“ж ҮзӯҫеӨұиҙҘ: $image -> $target_image"
                failed_count=$((failed_count + 1))
                failed_images+=("$image")
                continue
            fi

            # жҺЁйҖҒй•ңеғҸ
            if ! docker push $target_image; then
                echo "вқҢ Docker жҺЁйҖҒеӨұиҙҘ: $target_image"
                failed_count=$((failed_count + 1))
                failed_images+=("$image")
                continue
            fi

            echo "вң… й•ңеғҸжҺЁйҖҒжҲҗеҠҹ: $target_image"
            updated_count=$((updated_count + 1))
        done

        echo "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~"
        echo "рҹ“Ҡ еӨ„зҗҶжұҮжҖ»:"
        echo "   жҖ»и®Ў: ${#images[@]} дёӘй•ңеғҸ"
        echo "   вң… жӣҙж–°: $updated_count дёӘ"
        echo "   вҸӯпёҸ  и·іиҝҮ: $skipped_count дёӘ"
        echo "   вқҢ еӨұиҙҘ: $failed_count дёӘ"

        if [ $failed_count -gt 0 ]; then
            echo "   еӨұиҙҘзҡ„й•ңеғҸ:"
            for img in "${failed_images[@]}"; do
                echo "      - $img"
            done
        fi

        # е°ҶиҪ¬еӯҳзҡ„й•ңеғҸеҲ—иЎЁдҝқеӯҳеҲ°зҺҜеўғеҸҳйҮҸпјҢдҫӣwebhookдҪҝз”Ё
        images_csv=$(IFS=','; echo "${images[*]}")
        echo "transfer_images=$images_csv" >> $GITHUB_ENV
        echo "transfer_count=$updated_count" >> $GITHUB_ENV
        echo "transfer_skipped=$skipped_count" >> $GITHUB_ENV
        echo "transfer_failed=$failed_count" >> $GITHUB_ENV

    - name: Notify OpenClaw
      if: always()  # ж— и®әжҲҗеҠҹжҲ–еӨұиҙҘйғҪеҸ‘йҖҒйҖҡзҹҘ
      run: |
        echo "=========================================="
        echo "еҸ‘йҖҒ webhook йҖҡзҹҘ..."
        echo "WEBHOOK_URL: ${{ secrets.OPENCLAW_WEBHOOK_URL }}"
        echo "job.status: ${{ job.status }}"
        echo "github.run_id: ${{ github.run_id }}"
        echo "transfer_images: ${{ env.transfer_images }}"
        echo "transfer_count: ${{ env.transfer_count }}"
        echo "transfer_skipped: ${{ env.transfer_skipped }}"
        echo "transfer_failed: ${{ env.transfer_failed }}"
        echo "=========================================="

        # з”ҹжҲҗ JSON ж•°жҚ®пјҲеҚ•иЎҢпјү- еҢ…еҗ«жӣҙиҜҰз»Ҷзҡ„з»ҹи®ЎдҝЎжҒҜ
        WEBHOOK_DATA="{\"event\":\"docker_image_transfer\",\"status\":\"${{ job.status }}\",\"run_id\":\"${{ github.run_id }}\",\"run_number\":\"${{ github.run_number }}\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"images\":\"${{ env.transfer_images }}\",\"updated_count\":\"${{ env.transfer_count }}\",\"skipped_count\":\"${{ env.transfer_skipped }}\",\"failed_count\":\"${{ env.transfer_failed }}\",\"actor\":\"${{ github.actor }}\",\"timestamp\":\"$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\"}"

        echo "еҸ‘йҖҒзҡ„ж•°жҚ®: $WEBHOOK_DATA"

        # еҸ‘йҖҒ webhook
        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST "${{ secrets.OPENCLAW_WEBHOOK_URL }}" \
          -H "Authorization: Bearer ${{ secrets.OPENCLAW_HOOK_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "$WEBHOOK_DATA")

        echo "HTTP зҠ¶жҖҒз Ғ: $RESPONSE"
        echo "=========================================="